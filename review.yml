reviews:
  - date: '2026-06-03'
    rating: 3
    summary: >-
      UNC-Chapel Hill has a real but decentralized public API footprint. Verified
      live: the UNC Dataverse native REST API (returns version 6.8 from
      /api/info/version) and the ArcGIS Hub GIS open-data DCAT-US feed (HTTP 200).
      The UNC Libraries GitHub organization is real with 84 public repos including
      the box-c Digital Collections Repository, whose site (dc.lib.unc.edu) is
      live. The Facilities SPOTS REST API exists but its docs are Onyen-gated, and
      the OIRA "API List" page resolves but contains no published API specs.
      Campus SSO (sso.unc.edu) and Onyen handle authentication. No single unified
      public developer portal was found. No endpoints were fabricated; gated and
      empty resources are noted honestly.
