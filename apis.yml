---
aid: university-of-north-carolina-at-chapel-hill
name: University of North Carolina at Chapel Hill
description: >-
  The University of North Carolina at Chapel Hill is a leading public research
  university in Chapel Hill, North Carolina, United States, ranked #155 in the QS
  World University Rankings 2025. Its public developer and API footprint is
  centered on research and open-data infrastructure rather than a single unified
  developer portal: UNC Dataverse exposes a live, documented native REST API for
  social-science and research data (running Dataverse 6.8), the campus ArcGIS Hub
  open-data site publishes geospatial data through DCAT-US feeds and ArcGIS REST
  services, and the UNC Libraries software-development team maintains a public
  GitHub organization with the box-c Digital Collections Repository and other
  open-source tooling. Most administrative and student-information-system APIs
  (such as the Facilities SPOTS REST API and campus single sign-on) are gated
  behind Onyen/Shibboleth authentication.
