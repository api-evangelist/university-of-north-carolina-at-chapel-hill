  - aid: university-of-north-carolina-at-chapel-hill:gis-opendata
    name: UNC GIS Open Data Hub
    description: >-
      UNC-Chapel Hill's ArcGIS Hub open-data site publishing geospatial and
      institutional datasets. Data is programmatically accessible via ArcGIS Hub
      DCAT-US 1.1 catalog feeds and the underlying ArcGIS REST / GeoServices
      endpoints (GeoJSON, CSV, and feature service queries).
    humanURL: https://gisdata-uncadmin.opendata.arcgis.com/
