  - aid: university-of-north-carolina-at-chapel-hill:digital-collections
    name: UNC Libraries Digital Collections Repository (box-c)
    description: >-
      The UNC Libraries Digital Collections Repository, powered by the
      open-source box-c application maintained by the UNC Libraries software
      development team on GitHub. Provides web access to digitized special
      collections; the application source and supporting tooling are publicly
      available, and the platform participates in standard library
      interoperability patterns.
    humanURL: https://dc.lib.unc.edu/
